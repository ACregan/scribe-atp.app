# Security headers — nginx
#
# Add these directives inside the server {} block that proxies the main app
# to port 3008. They apply to all responses from that server block, including
# HTML pages, JSON API responses, and static assets served through the app.
#
# The same headers are also set at the Node.js layer in app/entry.server.tsx
# as belt-and-suspenders in case nginx is ever bypassed or misconfigured.
#
# Note: these directives must sit inside server {} (not inside a location block)
# so they apply globally. If you have per-location add_header directives,
# nginx's inheritance rules mean you must repeat these there too — or use the
# headers_more module (add_header is not inherited when a child block overrides it).

add_header X-Frame-Options            "SAMEORIGIN"                          always;
add_header X-Content-Type-Options     "nosniff"                             always;
add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
