# Image Library — nginx location blocks
#
# Add these blocks inside your existing server {} block, alongside whatever
# currently proxies the main app to port 3008.
#
# The trailing slash on the alias path is required.

# ---------------------------------------------------------------------------
# /image-storage/*  — serve Variant WebP files directly from the filesystem.
# nginx handles reads entirely; the Image Service and Node.js are not involved.
# Files are immutable once written (new uploads always get a new UUID), so a
# long-lived cache header is safe.
# ---------------------------------------------------------------------------
location /image-storage/ {
    alias /var/scribe/images/;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff";
    types {
        image/webp webp;
    }
    default_type image/webp;
}

# ---------------------------------------------------------------------------
# /api/image-service/*  — proxy to the Image Service on port 3009.
#
# SSE requirements:
#   proxy_buffering off        — emit each event immediately, not in chunks
#   proxy_cache off            — do not cache the streaming response
#   proxy_read_timeout 3600s   — keep the connection open for up to 1 hour;
#                                the 30s SSE heartbeat prevents idle timeouts
#   proxy_http_version 1.1     — required for chunked transfer / keepalive
#   proxy_set_header Connection ''  — clear Connection header for keepalive
# ---------------------------------------------------------------------------
location /api/image-service/ {
    proxy_pass http://127.0.0.1:3009;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
}
