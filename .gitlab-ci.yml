deploy:
  stage: deploy
  tags:
    - playwright
  environment:
    name: production
    url: https://scribe-atp.app
  before_script:
    - eval $(ssh-agent -s)
    - echo "Key first line:" && head -1 "$SSH_DEPLOY_KEY"
    - chmod 400 "$SSH_DEPLOY_KEY" && ssh-add "$SSH_DEPLOY_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $VPS_USER@$VPS_HOST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
