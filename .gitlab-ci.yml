stages:
  - typecheck
  - unit
  - e2e
  - deploy

variables:
  # Project-relative so GitLab CI can cache it across runs — sharp's install
  # script checks $npm_config_cache/_libvips for an already-downloaded
  # prebuilt binary before hitting the network (node_modules/sharp/install/
  # libvips.js), but npm ci always wipes and reinstalls node_modules, so
  # only caching npm's own cache dir (not just node_modules/) lets that
  # check ever hit. Without this, sharp re-downloads from GitHub releases
  # on every single CI run, and a slow/flaky connection to GitHub means an
  # intermittently failing install with no application-code cause.
  npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"

typecheck:
  stage: typecheck
  image: node:20
  interruptible: true
  tags:
    - SERVER-docker-runner
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm-cache/
  script:
    - npm ci
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.json"
        - ".gitlab-ci.yml"

unit:
  stage: unit
  image: node:20
  interruptible: true
  tags:
    - SERVER-docker-runner
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm-cache/
  script:
    - npm ci
    - npm run test:coverage
  coverage: '/All files\s*\|\s*([\d.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.css"
        - "**/*.json"
        - ".gitlab-ci.yml"

e2e:
  stage: e2e
  # Playwright image has Chromium pre-installed — no playwright install step needed
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  interruptible: true
  tags:
    - SERVER-docker-runner
  timeout: 20 minutes
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm-cache/
  script:
    - npm ci
    - npx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.css"
        - "**/*.json"
        - ".gitlab-ci.yml"

deploy:
  stage: deploy
  image: node:20
  tags:
    - SERVER-docker-runner
  environment:
    name: production
    url: https://scribe-cms.app
  before_script:
    - command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )
    - eval $(ssh-agent -s)
    - printf '\n' >> "$SSH_DEPLOY_KEY"
    - chmod 400 "$SSH_DEPLOY_KEY" && ssh-add "$SSH_DEPLOY_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $VPS_USER@$VPS_HOST "~/server/deploy.sh scribe-atp.app"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
