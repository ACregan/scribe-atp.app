stages:
  - typecheck
  - unit
  - e2e
  - deploy

typecheck:
  stage: typecheck
  image: node:20
  interruptible: true
  tags:
    - SERVER-docker-runner
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.json"
        - ".gitlab-ci.yml"

unit:
  stage: unit
  image: node:20
  interruptible: true
  tags:
    - SERVER-docker-runner
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run test:coverage
  coverage: '/All files\s*\|\s*([\d.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.css"
        - "**/*.json"
        - ".gitlab-ci.yml"

e2e:
  stage: e2e
  # Playwright image has Chromium pre-installed — no playwright install step needed
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  interruptible: true
  tags:
    - SERVER-docker-runner
  timeout: 20 minutes
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.css"
        - "**/*.json"
        - ".gitlab-ci.yml"

deploy:
  stage: deploy
  # Stays on Imhotep — shell executor with SSH tools, deploy doesn't benefit from Docker runner
  tags:
    - playwright
  environment:
    name: production
    url: https://scribe-atp.app
  before_script:
    - eval $(ssh-agent -s)
    - printf '\n' >> "$SSH_DEPLOY_KEY"
    - chmod 400 "$SSH_DEPLOY_KEY" && ssh-add "$SSH_DEPLOY_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $VPS_USER@$VPS_HOST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
